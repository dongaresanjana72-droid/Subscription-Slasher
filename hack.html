<!DOCTYPE html>
<html>
<head>
  <title>SubTrack - Smart Manager</title>

  <!-- CSS -->
  <link rel="stylesheet" href="hack.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>


<div class="brand">
  <h1>💳 SubTrack</h1>
  <p>Manage your subscriptions smartly</p>
</div>


<div id="authBox" class="box">

  <h2 id="formTitle">Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p onclick="toggleForm()" class="link">
    Don't have account? Sign Up
  </p>

</div>


<div id="dashboard" style="display:none;">

  <button onclick="toggleTheme()">🌗 Theme</button>

  <h1>Welcome to SubTrack</h1>

  <div class="top-card">
    Total Monthly Cost: ₹ <span id="total">0</span>
  </div>

  
  <div class="card add-box">
    <h3>Add Subscription</h3>

    <input id="name" placeholder="Netflix / Spotify">
    <input id="amount" type="number" placeholder="Amount ₹">

    <select id="usage">
      <option value="low">Low Usage</option>
      <option value="medium">Medium Usage</option>
      <option value="high">High Usage</option>
    </select>

    <button onclick="addData()">➕ Add</button>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Subscriptions</h3>
      <ul id="list"></ul>
    </div>

    <div class="card">
      <h3>Suggestions</h3>
      <ul id="suggestions"></ul>
    </div>

    <div class="card">
      <h3>Chart</h3>
      <canvas id="myChart"></canvas>
    </div>

  </div>

</div>

<script src="hack.js"></script>
</body>
</html>
